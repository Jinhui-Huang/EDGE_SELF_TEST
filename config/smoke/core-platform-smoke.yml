id: core-platform-dsl-smoke
name: Core platform DSL smoke
steps:
  - id: open-smoke-page
    name: Open smoke page
    action: goto
    url: "data:text/html;charset=utf-8;base64,"
  - id: assert-title
    name: Assert title
    action: assert_title
    expected: Edge Self Test DSL Smoke
  - id: wait-url
    name: Wait for smoke page URL
    action: wait_for_url
    timeoutMs: 3000
    expected: "data:text/html;charset=utf-8;base64,"
  - id: wait-search
    name: Wait for search input
    action: wait_for_visible
    timeoutMs: 3000
    target:
      by: css
      value: "#search"
  - id: wait-absent
    name: Wait for absent panel
    action: wait_for_hidden
    timeoutMs: 3000
    target:
      by: css
      value: "#absent-panel"
  - id: fill-search
    name: Fill search input
    action: fill
    timeoutMs: 3000
    target:
      by: css
      value: "#search"
    value: codex
  - id: click-submit
    name: Click submit button
    action: click
    timeoutMs: 3000
    target:
      by: css
      value: "#submit"
  - id: assert-click-title
    name: Assert click updated title
    action: assert_title
    expected: "Clicked: codex"
  - id: capture-page
    name: Capture page
    action: screenshot
