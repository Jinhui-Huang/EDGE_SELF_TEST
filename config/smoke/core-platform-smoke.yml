id: core-platform-dsl-smoke
name: Core platform DSL smoke
steps:
  - id: open-smoke-page
    name: Open smoke page
    action: goto
    url: "data:text/html;charset=utf-8;base64,"
  - id: assert-title
    name: Assert title
    action: assert_title
    expected: Edge Self Test DSL Smoke
  - id: wait-url
    name: Wait for smoke page URL
    action: wait_for_url
    timeoutMs: 3000
    expected: "data:text/html;charset=utf-8;base64,"
  - id: assert-headline-visible
    name: Assert headline visible
    action: assert_visible
    target:
      by: css
      value: "#headline"
  - id: assert-headline-text
    name: Assert headline text
    action: assert_text
    target:
      by: css
      value: "#headline"
    expected: Edge Self Test DSL Smoke
  - id: wait-search
    name: Wait for search input
    action: wait_for_visible
    timeoutMs: 3000
    target:
      by: css
      value: "#search"
  - id: wait-absent
    name: Wait for hidden panel
    action: wait_for_hidden
    timeoutMs: 3000
    target:
      by: css
      value: "#hidden-panel"
  - id: assert-panel-hidden
    name: Assert panel hidden
    action: assert_not_visible
    target:
      by: css
      value: "#hidden-panel"
  - id: fill-search
    name: Fill search input
    action: fill
    timeoutMs: 3000
    target:
      by: css
      value: "#search"
    value: codex
  - id: assert-search-value
    name: Assert search value
    action: assert_value
    target:
      by: css
      value: "#search"
    expected: codex
  - id: assert-search-label
    name: Assert search label
    action: assert_attr
    target:
      by: css
      value: "#search"
    value: aria-label
    expected: Search
  - id: click-submit
    name: Click submit button
    action: click
    timeoutMs: 3000
    target:
      by: css
      value: "#submit"
  - id: assert-click-title
    name: Assert click updated title
    action: assert_title
    expected: "Clicked: codex"
  - id: capture-page
    name: Capture page
    action: screenshot
