<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EDGE_SELF_TEST · Platform UI v2 (Interactive Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0e0d0a; font-family: 'Geist', system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
  #root { width: 100vw; height: 100vh; overflow: hidden; }

  .shell { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
  .toolbar {
    flex-shrink: 0; height: 44px; padding: 0 16px;
    display: flex; align-items: center; gap: 12px;
    background: rgba(20,18,14,0.96); color: #e8e3d6;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 12px; z-index: 50;
  }
  .toolbar .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5f57; }
  .toolbar .dot.y { background: #febc2e; }
  .toolbar .dot.g { background: #28c840; }
  .toolbar .brand { font-weight: 600; letter-spacing: -0.01em; }
  .toolbar .sep { flex: 1; }
  .toolbar select, .toolbar button {
    font-family: inherit; font-size: 12px; padding: 5px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
    color: #e8e3d6; cursor: pointer; outline: none;
    transition: background 120ms;
  }
  .toolbar select:hover, .toolbar button:hover { background: rgba(255,255,255,0.08); }
  .toolbar label { color: #a8a193; margin-right: 4px; }

  .stage { flex: 1; display: flex; min-height: 0; }
  .scaler {
    flex: 1; min-width: 0; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: auto; padding: 16px;
  }
  .artboard-wrap { transform-origin: center center; }
  .artboard {
    width: 1440px; height: 900px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.25);
    border-radius: 6px; overflow: hidden; position: relative;
    background: #fff;
  }
  /* Scrollbar */
  .scaler::-webkit-scrollbar { width: 10px; height: 10px; }
  .scaler::-webkit-scrollbar-track { background: transparent; }
  .scaler::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
  .scaler::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.5 } }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
/* ============================================================
 *  EDGE_SELF_TEST — Platform UI v2 (Interactive Demo)
 *  单文件可交互演示 · 适合 React 接入
 *
 *  如何迁移到 React 项目：
 *   1. 将 LIGHT / DARK / FONT / ThemeContext / useTheme / L() 拆到
 *      src/theme.ts（直接导出即可）
 *   2. 将 Logo / TopBar / Sidebar / Card / Button / Badge / Tabs / Ring /
 *      BrowserChrome / CodeBlock 等拆到 src/components/ui-kit/
 *   3. 将 ScreenDashboard / ScreenProjects / ... 等 11 个屏拆到
 *      src/screens/ — 每屏独立文件，props 只依赖 useTheme()
 *   4. Frame 是通用外壳（TopBar + Sidebar + children），建议保留为
 *      src/components/Frame.tsx
 *   5. 主题、语言全部通过 ThemeContext 传递；sidebar 通过 setScreen
 *      抬升状态 —— 直接迁到 Zustand/Redux/Context 均可
 *
 *  本文件所有组件都是纯函数、仅依赖 useTheme() hook，
 *  没有全局副作用 —— 复制粘贴即用。
 * ============================================================ */

const { useState, useEffect, useRef, useCallback, useContext, createContext, Fragment } = React;

// ─────────────────────────────────────────────────────────────
// 1) 设计 Tokens（Theme） — 浅色 / 深色
// ─────────────────────────────────────────────────────────────
const LIGHT = {
  bg: '#F7F5F0',
  surface: '#FFFFFF',
  surface2: '#FAF8F3',
  border: '#E8E3D8',
  borderStrong: '#D4CEC0',
  text: '#1A1814',
  textMid: '#5C574D',
  textDim: '#8A8578',
  accent:       'oklch(72% 0.14 260)',
  accentSoft:   'oklch(92% 0.05 260)',
  accent2:      'oklch(72% 0.14 160)',
  accent2Soft:  'oklch(92% 0.05 160)',
  accent3:      'oklch(72% 0.14 40)',
  accent3Soft:  'oklch(92% 0.05 40)',
  accent4:      'oklch(72% 0.14 320)',
  success:      'oklch(62% 0.14 150)',
  warning:      'oklch(72% 0.14 70)',
  danger:       'oklch(62% 0.18 25)',
  shadow:   '0 1px 2px rgba(26,24,20,0.04), 0 8px 24px rgba(26,24,20,0.06)',
  shadowLg: '0 8px 32px rgba(26,24,20,0.1), 0 2px 8px rgba(26,24,20,0.06)',
};
const DARK = {
  bg: '#15140F',
  surface: '#1E1C16',
  surface2: '#24221B',
  border: '#332F25',
  borderStrong: '#47422F',
  text: '#F5F1E6',
  textMid: '#A8A193',
  textDim: '#6E685B',
  accent:       'oklch(75% 0.14 260)',
  accentSoft:   'oklch(28% 0.06 260)',
  accent2:      'oklch(75% 0.14 160)',
  accent2Soft:  'oklch(28% 0.06 160)',
  accent3:      'oklch(75% 0.14 40)',
  accent3Soft:  'oklch(28% 0.06 40)',
  accent4:      'oklch(75% 0.14 320)',
  success:      'oklch(70% 0.14 150)',
  warning:      'oklch(78% 0.14 70)',
  danger:       'oklch(68% 0.18 25)',
  shadow:   '0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35)',
  shadowLg: '0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3)',
};
const FONT = {
  sans: '"Geist", "Inter", -apple-system, system-ui, sans-serif',
  mono: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
};

// 双语工具
const L = (dict, lang) => {
  if (!dict) return '';
  if (typeof dict === 'string') return dict;
  return dict[lang] || dict.en || dict.zh || '';
};

const ThemeContext = createContext({ theme: LIGHT, mode: 'light', lang: 'zh', screen: 'dashboard', setScreen: () => {} });
const useTheme = () => useContext(ThemeContext);

// ─────────────────────────────────────────────────────────────
// 2) UI Kit — 复用组件
// ─────────────────────────────────────────────────────────────
function Logo({ size = 28 }) {
  const { theme } = useTheme();
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        width: size, height: size, borderRadius: size * 0.3,
        background: `conic-gradient(from 220deg, ${theme.accent}, ${theme.accent2}, ${theme.accent3}, ${theme.accent})`,
        position: 'relative', boxShadow: `0 2px 8px ${theme.accent}40`,
      }}>
        <div style={{ position: 'absolute', inset: size * 0.22, background: theme.surface, borderRadius: size * 0.14 }}/>
        <div style={{ position: 'absolute', inset: size * 0.35, background: theme.accent, borderRadius: '50%' }}/>
      </div>
      <div style={{ fontFamily: FONT.mono, fontSize: size * 0.5, fontWeight: 600, color: theme.text, letterSpacing: '-0.02em' }}>
        edge<span style={{ color: theme.accent }}>.</span>test
      </div>
    </div>
  );
}

function Divider({ v }) {
  const { theme } = useTheme();
  return v
    ? <div style={{ width: 1, height: 20, background: theme.border }}/>
    : <div style={{ height: 1, background: theme.border, margin: '8px 0' }}/>;
}

function Pill({ children, color, icon, style }) {
  const { theme } = useTheme();
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '4px 10px', background: theme.surface2,
      border: `1px solid ${theme.border}`, borderRadius: 999,
      fontSize: 12, color: theme.textMid, fontFamily: FONT.sans,
      ...style,
    }}>
      {icon && <span style={{ color, fontSize: 10 }}>{icon}</span>}
      {children}
    </div>
  );
}

function SearchBar({ placeholder, value }) {
  const { theme } = useTheme();
  return (
    <div style={{
      height: 34, maxWidth: 380,
      display: 'flex', alignItems: 'center', gap: 8, padding: '0 12px',
      background: theme.surface2, border: `1px solid ${theme.border}`,
      borderRadius: 8, fontSize: 13, color: theme.textDim,
    }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      {value || placeholder}
    </div>
  );
}

function IconBtn({ children }) {
  const { theme } = useTheme();
  return (
    <div style={{
      width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
      borderRadius: 8, color: theme.textMid, fontSize: 14, cursor: 'pointer',
    }}>{children}</div>
  );
}

function Avatar({ name = 'U', color }) {
  const { theme } = useTheme();
  const bg = color || theme.accent3;
  const initials = name.split(/[\s.]/).filter(Boolean).slice(0, 2).map(s => s[0]).join('').toUpperCase();
  return (
    <div style={{
      width: 30, height: 30, borderRadius: '50%', background: bg,
      color: '#fff', fontWeight: 600, fontSize: 11,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>{initials}</div>
  );
}

function TopBar({ project = 'ACME Web App', env = 'staging' }) {
  const { theme, lang } = useTheme();
  return (
    <div style={{
      height: 56, background: theme.surface,
      borderBottom: `1px solid ${theme.border}`,
      display: 'flex', alignItems: 'center', padding: '0 20px', gap: 16, flexShrink: 0,
    }}>
      <Logo size={26}/>
      <Divider v/>
      <Pill icon="●" color={theme.accent}>{project}</Pill>
      <Pill icon="▸" color={theme.accent2}>{L({ en: 'env', zh: '环境' }, lang)}: <b>{env}</b></Pill>
      <div style={{ flex: 1 }}>
        <SearchBar placeholder={L({ en: 'Search projects, cases, runs…', zh: '搜索项目、用例、运行…' }, lang)}/>
      </div>
      <IconBtn>🔔</IconBtn>
      <Avatar name="L.Chen"/>
    </div>
  );
}

// 分组侧边栏 — 11 屏导航
const NAV_GROUPS = [
  {
    gEn: 'Main platform', gZh: '主平台',
    items: [
      { key: 'dashboard',  en: 'Dashboard',    zh: '仪表盘',   icon: '◐' },
      { key: 'projects',   en: 'Projects',     zh: '项目列表', icon: '▦' },
      { key: 'case',       en: 'Case detail',  zh: '用例详情', icon: '◈' },
    ],
  },
  {
    gEn: 'AI authoring', gZh: '文档 / AI',
    items: [
      { key: 'docparse',   en: 'Doc parse',    zh: '文档解析', icon: '▤' },
      { key: 'aigen',      en: 'AI generate',  zh: 'AI 生成',  icon: '✦' },
    ],
  },
  {
    gEn: 'Runtime', gZh: '执行与报告',
    items: [
      { key: 'exec',       en: 'Exec monitor', zh: '执行监控', icon: '▶' },
      { key: 'report',     en: 'Report',       zh: '报告详情', icon: '▩' },
      { key: 'datadiff',   en: 'Data diff',    zh: '数据差异', icon: '△' },
    ],
  },
  {
    gEn: 'Config', gZh: '配置中心',
    items: [
      { key: 'models',     en: 'Models',       zh: '模型配置', icon: '⚙' },
      { key: 'templates',  en: 'Data tpls',    zh: '数据模板', icon: '◎' },
    ],
  },
  {
    gEn: 'Browser plugin', gZh: 'Edge 插件',
    items: [
      { key: 'plugin',     en: 'Popup + picker', zh: '插件面板', icon: '◧' },
    ],
  },
];

function Sidebar({ width = 208 }) {
  const { theme, lang, screen, setScreen } = useTheme();
  return (
    <div style={{
      width, flexShrink: 0, background: theme.surface,
      borderRight: `1px solid ${theme.border}`,
      padding: '14px 10px 20px', overflow: 'auto',
      display: 'flex', flexDirection: 'column', gap: 2,
    }}>
      {NAV_GROUPS.map((g, gi) => (
        <Fragment key={gi}>
          <div style={{
            fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em',
            color: theme.textDim, padding: '10px 10px 6px', marginTop: gi === 0 ? 0 : 6,
          }}>{L({ en: g.gEn, zh: g.gZh }, lang)}</div>
          {g.items.map(it => {
            const active = it.key === screen;
            return (
              <div key={it.key}
                onClick={() => setScreen(it.key)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '8px 10px', borderRadius: 8,
                  fontSize: 13, fontWeight: active ? 600 : 500,
                  color: active ? theme.text : theme.textMid,
                  background: active ? theme.accentSoft : 'transparent',
                  border: active ? `1px solid ${theme.accent}40` : '1px solid transparent',
                  cursor: 'pointer',
                  transition: 'background 140ms, color 140ms',
                }}
                onMouseEnter={e => { if (!active) e.currentTarget.style.background = theme.surface2; }}
                onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
              >
                <span style={{ width: 16, color: active ? theme.accent : theme.textDim, fontSize: 12 }}>{it.icon}</span>
                <span>{L({ en: it.en, zh: it.zh }, lang)}</span>
                {active && <span style={{ marginLeft: 'auto', width: 4, height: 4, borderRadius: '50%', background: theme.accent }}/>}
              </div>
            );
          })}
        </Fragment>
      ))}
      <div style={{ flex: 1 }}/>
      <div style={{ padding: 10, fontSize: 10, color: theme.textDim, lineHeight: 1.4 }}>
        {L({ en: 'v2 demo · click any item', zh: 'v2 演示 · 点击切换' }, lang)}
      </div>
    </div>
  );
}

function Card({ children, style, padded = true, glow, ...rest }) {
  const { theme } = useTheme();
  return (
    <div {...rest} style={{
      background: theme.surface, border: `1px solid ${theme.border}`,
      borderRadius: 12, padding: padded ? 16 : 0,
      boxShadow: glow ? `0 0 0 3px ${theme.accent}20, ${theme.shadow}` : theme.shadow,
      transition: 'box-shadow 200ms', ...style,
    }}>{children}</div>
  );
}

function StatCard({ label, value, delta, color, icon }) {
  const { theme } = useTheme();
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
        <div style={{ fontSize: 11, color: theme.textMid, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{label}</div>
        <div style={{
          width: 24, height: 24, borderRadius: 6,
          background: (color || theme.accent) + '22', color: color || theme.accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12, fontWeight: 700,
        }}>{icon}</div>
      </div>
      <div style={{ fontSize: 28, fontWeight: 700, color: theme.text, letterSpacing: '-0.02em' }}>{value}</div>
      {delta && (
        <div style={{ fontSize: 11, color: theme.textMid, marginTop: 4, display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ color: theme.success }}>▲</span> {delta}
        </div>
      )}
    </Card>
  );
}

function Button({ children, variant = 'secondary', icon, size = 'md', style, onClick }) {
  const { theme } = useTheme();
  const variants = {
    primary:   { bg: theme.accent, color: '#fff', border: theme.accent },
    secondary: { bg: theme.surface, color: theme.text, border: theme.borderStrong },
    ghost:     { bg: 'transparent', color: theme.textMid, border: 'transparent' },
    success:   { bg: theme.success, color: '#fff', border: theme.success },
  };
  const v = variants[variant];
  const sizes = { sm: { h: 28, fs: 12, px: 10 }, md: { h: 34, fs: 13, px: 14 }, lg: { h: 40, fs: 14, px: 18 } };
  const s = sizes[size];
  return (
    <div onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      height: s.h, padding: `0 ${s.px}px`,
      background: v.bg, color: v.color, border: `1px solid ${v.border}`,
      borderRadius: 8, fontSize: s.fs, fontWeight: 500,
      cursor: 'pointer', whiteSpace: 'nowrap',
      boxShadow: variant === 'primary' ? `0 1px 2px ${theme.accent}40, 0 2px 8px ${theme.accent}30` : 'none',
      ...style,
    }}>
      {icon && <span style={{ fontSize: s.fs - 1 }}>{icon}</span>}
      {children}
    </div>
  );
}

function Badge({ children, variant = 'neutral', dot, style }) {
  const { theme } = useTheme();
  const variants = {
    success: { bg: theme.success + '22', color: theme.success, dotC: theme.success },
    warning: { bg: theme.warning + '22', color: theme.warning, dotC: theme.warning },
    danger:  { bg: theme.danger + '22',  color: theme.danger,  dotC: theme.danger  },
    info:    { bg: theme.accent + '22',  color: theme.accent,  dotC: theme.accent  },
    neutral: { bg: theme.surface2,       color: theme.textMid, dotC: theme.textDim },
    mint:    { bg: theme.accent2 + '22', color: theme.accent2, dotC: theme.accent2 },
    coral:   { bg: theme.accent3 + '22', color: theme.accent3, dotC: theme.accent3 },
  };
  const v = variants[variant];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '2px 8px', background: v.bg, color: v.color,
      borderRadius: 999, fontSize: 11, fontWeight: 600,
      letterSpacing: '0.01em', ...style,
    }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: v.dotC }}/>}
      {children}
    </span>
  );
}

function Tabs({ tabs, active, onClick }) {
  const { theme } = useTheme();
  const [local, setLocal] = useState(active);
  useEffect(() => setLocal(active), [active]);
  return (
    <div style={{ display: 'flex', gap: 4, borderBottom: `1px solid ${theme.border}`, paddingLeft: 4 }}>
      {tabs.map(t => {
        const isActive = t.key === local;
        return (
          <div key={t.key}
            onClick={() => { setLocal(t.key); onClick && onClick(t.key); }}
            style={{
              padding: '10px 14px', fontSize: 13,
              fontWeight: isActive ? 600 : 500,
              color: isActive ? theme.text : theme.textMid,
              borderBottom: `2px solid ${isActive ? theme.accent : 'transparent'}`,
              marginBottom: -1, cursor: 'pointer',
            }}>{t.label}</div>
        );
      })}
    </div>
  );
}

function SectionHead({ title, subtitle, actions }) {
  const { theme } = useTheme();
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', marginBottom: 16 }}>
      <div>
        <div style={{ fontSize: 20, fontWeight: 700, color: theme.text, letterSpacing: '-0.02em' }}>{title}</div>
        {subtitle && <div style={{ fontSize: 13, color: theme.textMid, marginTop: 4 }}>{subtitle}</div>}
      </div>
      {actions && <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>{actions}</div>}
    </div>
  );
}

function Ring({ progress = 0.5, size = 44, stroke = 4, color, label }) {
  const { theme } = useTheme();
  const c = color || theme.accent;
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={theme.border} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={circ * (1 - progress)}
          strokeLinecap="round" style={{ transition: 'stroke-dashoffset 200ms' }}/>
      </svg>
      {label && (
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: size * 0.24, fontWeight: 700, color: theme.text,
        }}>{label}</div>
      )}
    </div>
  );
}

function BrowserChrome({ url, children, width = 920, height = 560, showExtIcon }) {
  const { theme } = useTheme();
  return (
    <div style={{
      width, height, background: theme.surface,
      border: `1px solid ${theme.borderStrong}`, borderRadius: 12,
      overflow: 'hidden', boxShadow: theme.shadowLg,
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{
        height: 40, flexShrink: 0, background: theme.surface2,
        borderBottom: `1px solid ${theme.border}`,
        display: 'flex', alignItems: 'center', gap: 10, padding: '0 12px',
      }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {['#FF5F57', '#FEBC2E', '#28C840'].map(c => (
            <div key={c} style={{ width: 11, height: 11, borderRadius: '50%', background: c }}/>
          ))}
        </div>
        <div style={{
          flex: 1, height: 24, maxWidth: 420, background: theme.surface,
          border: `1px solid ${theme.border}`, borderRadius: 6,
          display: 'flex', alignItems: 'center', padding: '0 10px',
          fontSize: 11, color: theme.textMid, fontFamily: FONT.mono,
        }}>🔒 {url}</div>
        {showExtIcon && (
          <div style={{
            width: 26, height: 26, borderRadius: 6,
            background: `linear-gradient(135deg, ${theme.accent}, ${theme.accent2})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontSize: 12, fontWeight: 700,
            boxShadow: showExtIcon === 'active' ? `0 0 0 3px ${theme.accent}40` : 'none',
          }}>E</div>
        )}
      </div>
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden', background: theme.surface }}>
        {children}
      </div>
    </div>
  );
}

function CodeBlock({ lines, style }) {
  const { theme } = useTheme();
  return (
    <div style={{

function TreeNode({ children, glyph, c, indent = 0 }) {
  const { theme } = useTheme();
  return (
    <div style={{ display: 'flex', gap: 6, padding: '3px 0', paddingLeft: indent * 16 }}>
      <span style={{ color: c, width: 10 }}>{glyph}</span>
      <span style={{ color: indent ? theme.textMid : theme.text, fontWeight: indent ? 400 : 500 }}>{children}</span>
    </div>
  );
}
function StateMachineSVG() {
  const { theme } = useTheme();
  const nodes = [
    { id: 'cart', x: 80,  y: 70,  label: 'cart.loaded',        color: theme.accent  },
    { id: 'form', x: 280, y: 70,  label: 'checkout.form',      color: theme.accent  },
    { id: 'pay',  x: 280, y: 220, label: 'payment.processing', color: theme.warning },
    { id: 'done', x: 80,  y: 220, label: 'order.confirmed',    color: theme.success },
    { id: 'fail', x: 480, y: 220, label: 'payment.failed',     color: theme.danger  },
  ];
  const edges = [
    { from: 'cart', to: 'form', label: 'click proceed' },
    { from: 'form', to: 'pay',  label: 'submit' },
    { from: 'pay',  to: 'done', label: '2xx' },
    { from: 'pay',  to: 'fail', label: '4xx/5xx', dashed: true },
    { from: 'fail', to: 'form', label: 'retry',   dashed: true },
  ];
  const n = (id) => nodes.find(x => x.id === id);
  return (
    <svg viewBox="0 0 560 320" style={{ width: '100%', height: '100%' }}>
      <defs>
        <marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,-4L8,0L0,4" fill={theme.textMid}/>
        </marker>
      </defs>
      {edges.map((e, i) => {
        const a = n(e.from), b = n(e.to);
        const midX = (a.x + b.x) / 2, midY = (a.y + b.y) / 2;
        return (
          <g key={i}>
            <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
              stroke={theme.textMid} strokeWidth="1.4"
              strokeDasharray={e.dashed ? '4 3' : null}
              markerEnd="url(#arrow)" opacity="0.6"/>
            <rect x={midX - 40} y={midY - 8} width="80" height="16" rx="8" fill={theme.surface2} stroke={theme.border}/>
            <text x={midX} y={midY + 3} fontSize="9" fill={theme.textMid} textAnchor="middle" fontFamily={FONT.mono}>{e.label}</text>
          </g>
        );
      })}
      {nodes.map(nd => (
        <g key={nd.id}>
          <rect x={nd.x - 62} y={nd.y - 18} width="124" height="36" rx="18" fill={nd.color + '18'} stroke={nd.color} strokeWidth="1.4"/>
          <circle cx={nd.x - 48} cy={nd.y} r="3" fill={nd.color}/>
          <text x={nd.x - 38} y={nd.y + 4} fontSize="11" fill={theme.text} fontFamily={FONT.mono} fontWeight="500">{nd.label}</text>
        </g>
      ))}
    </svg>
  );
}

function useFitScale(ref, base = { w: 1440, h: 900 }) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      const r = el.getBoundingClientRect();
      const padding = 32;
      const sW = (r.width  - padding) / base.w;
      const sH = (r.height - padding) / base.h;
      setScale(Math.min(sW, sH, 1.4));
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, [ref, base.w, base.h]);
  return scale;
}

          </select>
          <label>{lang === 'zh' ? '主题' : 'Theme'}</label>
          <select value={mode} onChange={e => setMode(e.target.value)}>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <label>{lang === 'zh' ? '语言' : 'Lang'}</label>
          <select value={lang} onChange={e => setLang(e.target.value)}>
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
          <span style={{ fontSize: 10, color: '#6e685b', marginLeft: 8 }}>
            {Math.round(scale * 100)}%
          </span>
        </div>

        {/* 舞台 */}
        <div className="stage">
          <div className="scaler" ref={stageRef}>
            <div className="artboard-wrap" style={{ transform: `scale(${scale})` }}>
              <div className="artboard">
                <ScreenC/>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
